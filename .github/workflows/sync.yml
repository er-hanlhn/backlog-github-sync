# Fallback cron sync — primary trigger is webhook via webhook-sync.yml
name: Backlog to GitHub Projects Sync (cron fallback)

on:
  schedule:
    - cron: '0 * * * *'  # Hourly fallback for missed webhooks
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  load-projects:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - id: set-matrix
        run: echo "matrix=$(cat sync-projects.json | jq -c '.')" >> $GITHUB_OUTPUT

  sync:
    needs: load-projects
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project: ${{ fromJson(needs.load-projects.outputs.matrix) }}
      fail-fast: false
    concurrency:
      group: backlog-sync-${{ matrix.project.name }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Run sync for ${{ matrix.project.name }}
        run: node dist/src/index.js
        env:
          PROJECT_NAME: ${{ matrix.project.name }}
          BACKLOG_SPACE: ${{ secrets.BACKLOG_SPACE }}
          BACKLOG_DOMAIN: ${{ secrets.BACKLOG_DOMAIN }}
          BACKLOG_API_KEY: ${{ secrets.BACKLOG_API_KEY }}
          BACKLOG_PROJECT_ID: ${{ matrix.project.backlog_project_id }}
          GITHUB_TOKEN: ${{ secrets.PROJECT_PAT }}
          PROJECT_OWNER: ${{ vars.PROJECT_OWNER }}
          PROJECT_NUMBER: ${{ matrix.project.project_number }}
          ISSUES_OWNER: ${{ matrix.project.issues_owner }}
          ISSUES_REPO: ${{ matrix.project.issues_repo }}
          SYNC_MODE: issues
          FIELD_MAPPING_PATH: ${{ matrix.project.field_mapping }}
          INITIAL_SYNC_HOURS: ${{ vars.INITIAL_SYNC_HOURS || '720' }}
          MAX_ISSUES_PER_RUN: ${{ vars.MAX_ISSUES_PER_RUN || '500' }}

      - name: Commit sync state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git stash --include-untracked
          git pull --rebase
          git stash pop || true
          STATE_FILE=".sync-state-${{ matrix.project.name }}.json"
          git diff --quiet "$STATE_FILE" || (
            git add "$STATE_FILE" &&
            git commit -m "chore: update sync state for ${{ matrix.project.name }}" &&
            git push
          )
