name: Reverse Status Sync (GitHub -> Backlog)

on:
  issues:
    types: [closed, reopened]

concurrency:
  group: reverse-sync-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  reverse-sync:
    # Skip if the bot itself closed/reopened the issue (prevent loops)
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: er-hanlhn/backlog-github-sync
          token: ${{ secrets.PROJECT_PAT }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Run reverse sync
        run: node dist/src/reverse-sync.js
        env:
          BACKLOG_SPACE: ${{ secrets.BACKLOG_SPACE }}
          BACKLOG_DOMAIN: ${{ secrets.BACKLOG_DOMAIN }}
          BACKLOG_API_KEY: ${{ secrets.BACKLOG_API_KEY }}
          BACKLOG_PROJECT_ID: ${{ secrets.BACKLOG_PROJECT_ID }}
          GITHUB_TOKEN: ${{ secrets.PROJECT_PAT }}
          PROJECT_OWNER: ${{ vars.PROJECT_OWNER }}
          PROJECT_NUMBER: ${{ vars.PROJECT_NUMBER }}
          ISSUES_OWNER: er-hanlhn
          ISSUES_REPO: hanlhn-team
          SYNC_MODE: issues
